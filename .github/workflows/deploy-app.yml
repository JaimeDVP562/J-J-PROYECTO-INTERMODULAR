name: Deploy App

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to API server via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }} # set to your API server public IP or bastion tunnel host
          username: ${{ secrets.DEPLOY_USER }} # e.g. ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }} # private key (set as secret)
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            # Ensure app dir exists and pull latest code
            if [ ! -d /var/www/laravel-api ]; then
              git clone https://github.com/your/repo.git /var/www/laravel-api
            fi
            cd /var/www/laravel-api
            git fetch --all
            git reset --hard origin/main
            composer install --no-dev --optimize-autoloader
            # Ensure .env is in place (manage secrets appropriately)
            php artisan key:generate --force
            php artisan migrate --force
            php artisan config:cache
            sudo systemctl restart apache2

      - name: Notify
        run: echo "Deploy finished"

# NOTE: Configure repository Secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PORT
