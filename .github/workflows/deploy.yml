name: CI/CD Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SSH_USER: ubuntu
  PHP_VERSION: "8.2"
  NODE_VERSION: "20"

jobs:

  ##############################################
  # JOB 1: Tests del backend Laravel
  ##############################################
  test-backend:
    name: Tests Backend (Laravel)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo_mysql, xml, bcmath, zip, curl

      - name: Instalar dependencias Composer
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Preparar entorno de test
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Ejecutar tests
        working-directory: backend
        run: php artisan test --stop-on-failure

  ##############################################
  # JOB 2: Build del frontend Angular
  ##############################################
  build-frontend:
    name: Build Frontend (Angular)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias npm
        working-directory: frontend
        run: npm ci

      - name: Build de producción
        working-directory: frontend
        run: npm run build -- --configuration production

      - name: Subir artefacto de build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  ##############################################
  # JOB 3: Deploy backend a EC2 API
  ##############################################
  deploy-backend:
    name: Deploy Backend → EC2 API
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.BASTION_HOST }}" >> ~/.ssh/known_hosts

      - name: Añadir host API a known_hosts vía bastion
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ProxyJump=${{ env.SSH_USER }}@${{ secrets.BASTION_HOST }} \
              ${{ env.SSH_USER }}@${{ secrets.API_HOST }} \
              "echo 'Conexión OK'"

      - name: Copiar código backend vía rsync
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='vendor' \
            --exclude='.env' \
            --exclude='storage/logs/*' \
            -e "ssh -o StrictHostKeyChecking=no -J ${{ env.SSH_USER }}@${{ secrets.BASTION_HOST }}" \
            backend/ \
            ${{ env.SSH_USER }}@${{ secrets.API_HOST }}:/tmp/laravel-deploy/

      - name: Instalar dependencias y desplegar
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ProxyJump=${{ env.SSH_USER }}@${{ secrets.BASTION_HOST }} \
              ${{ env.SSH_USER }}@${{ secrets.API_HOST }} << 'ENDSSH'
            set -e
            APP_DIR="/var/www/laravel-api"
            APP_USER="laravel-api"

            # Copiar archivos al directorio de la app
            sudo rsync -a --delete \
              --exclude='.env' \
              --exclude='storage/logs/*' \
              /tmp/laravel-deploy/ "$APP_DIR/"

            # Crear/actualizar .env de producción
            sudo tee "$APP_DIR/.env" > /dev/null <<ENV
          APP_NAME=JJ-Proyecto
          APP_ENV=production
          APP_KEY=$APP_KEY_VALUE
          APP_DEBUG=false
          APP_URL=https://$FRONTEND_HOST_VALUE

          DB_CONNECTION=mysql
          DB_HOST=$DB_HOST_VALUE
          DB_PORT=3306
          DB_DATABASE=laravel_db
          DB_USERNAME=laravel_user
          DB_PASSWORD=$DB_PASSWORD_VALUE
          ENV

            # Permisos correctos
            sudo chown -R "$APP_USER":www-data "$APP_DIR"
            sudo chmod -R 750 "$APP_DIR"
            sudo chmod -R 775 "$APP_DIR/storage" "$APP_DIR/bootstrap/cache"

            # Instalar dependencias PHP
            cd "$APP_DIR"
            sudo -u "$APP_USER" composer install --no-dev --optimize-autoloader --no-interaction

            # Comandos artisan
            sudo -u "$APP_USER" php artisan migrate --force
            sudo -u "$APP_USER" php artisan config:cache
            sudo -u "$APP_USER" php artisan route:cache
            sudo -u "$APP_USER" php artisan view:cache

            # Reiniciar servicios
            sudo systemctl restart php8.2-fpm apache2
          ENDSSH
        env:
          APP_KEY_VALUE: ${{ secrets.APP_KEY }}
          DB_HOST_VALUE: ${{ secrets.DB_HOST }}
          DB_PASSWORD_VALUE: ${{ secrets.DB_PASSWORD }}
          FRONTEND_HOST_VALUE: ${{ secrets.FRONTEND_HOST }}

  ##############################################
  # JOB 4: Deploy frontend a EC2 Frontend
  ##############################################
  deploy-frontend:
    name: Deploy Frontend → EC2 Frontend
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Descargar artefacto de build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.BASTION_HOST }}" >> ~/.ssh/known_hosts

      - name: Añadir host Frontend a known_hosts vía bastion
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ProxyJump=${{ env.SSH_USER }}@${{ secrets.BASTION_HOST }} \
              ${{ env.SSH_USER }}@${{ secrets.FRONTEND_HOST }} \
              "echo 'Conexión OK'"

      - name: Copiar build a servidor frontend
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -J ${{ env.SSH_USER }}@${{ secrets.BASTION_HOST }}" \
            dist/ \
            ${{ env.SSH_USER }}@${{ secrets.FRONTEND_HOST }}:/tmp/frontend-dist/

      - name: Mover archivos al directorio web
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ProxyJump=${{ env.SSH_USER }}@${{ secrets.BASTION_HOST }} \
              ${{ env.SSH_USER }}@${{ secrets.FRONTEND_HOST }} << 'ENDSSH'
            set -e
            WEB_DIR="/var/www/frontend"

            # Limpiar directorio web y copiar nuevo build
            sudo rm -rf "$WEB_DIR"/*
            sudo cp -r /tmp/frontend-dist/*/* "$WEB_DIR/" 2>/dev/null || \
              sudo cp -r /tmp/frontend-dist/* "$WEB_DIR/"
            sudo rm -rf /tmp/frontend-dist

            # Permisos para Apache (usuario apache-sec según configuración del servidor)
            sudo chown -R apache-sec:apache-sec "$WEB_DIR"
            sudo chmod -R 750 "$WEB_DIR"

            sudo systemctl restart apache2
          ENDSSH
