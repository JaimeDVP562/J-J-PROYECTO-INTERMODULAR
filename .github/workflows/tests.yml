name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"
  PHP_VERSION: "8.3"

jobs:

  ##############################################
  # Tests del backend Laravel
  ##############################################
  test-backend:
    name: Tests Backend (PHPUnit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo_mysql, xml, bcmath, zip, curl

      - name: Instalar dependencias Composer
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Preparar entorno de test
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Ejecutar tests PHPUnit
        working-directory: backend
        run: php artisan test --stop-on-failure

  ##############################################
  # Tests del frontend Angular
  ##############################################
  test-frontend:
    name: Tests Frontend (Angular/Karma)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias npm
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Ejecutar tests Angular
        working-directory: frontend
        run: npm test -- --watch=false --browsers=ChromeHeadlessCI
