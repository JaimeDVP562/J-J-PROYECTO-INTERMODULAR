  - { name: Usuarios,         description: Gestión de usuarios del sistema }
  - { name: Categorías,       description: Categorías de productos }
  - { name: Inventarios,      description: Control de inventario }
  - { name: Cierre de Caja,   description: Cierres de caja diarios }
  - { name: Devoluciones,     description: Devoluciones de ventas }
  - { name: Empresa,          description: Datos de la empresa emisora }
  - { name: Perfil,           description: Perfil del usuario }
  - { name: Estadísticas,     description: Estadísticas del negocio }
