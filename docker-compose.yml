services:
  database:
    image: mysql:8.0
    container_name: jj_database
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: jj_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - jj_db_data:/var/lib/mysql
    networks:
      - jj_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "user", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jj_backend
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8000:8000"
    working_dir: /workspaces/J-J-PROYECTO-INTERMODULAR/backend
    volumes:
      - .:/workspaces/J-J-PROYECTO-INTERMODULAR:cached
      - backend_vendor:/workspaces/J-J-PROYECTO-INTERMODULAR/backend/vendor
    environment:
      - APP_NAME=JJ
      - APP_ENV=local
      - APP_KEY=base64:hIuI8x9FS/yvdoe1Tn/+/8lU2x7LX2INFu9lC03gf7k=
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=mysql
      - DB_HOST=database
      - DB_PORT=3306
      - DB_DATABASE=jj_db
      - DB_USERNAME=user
      - DB_PASSWORD=password
    command: bash -c "composer install --no-interaction --prefer-dist && php artisan migrate --force && php artisan db:seed --force && php artisan serve --host 0.0.0.0 --port 8000"
    networks:
      - jj_network

  frontend:
    build:
      context: ./docker/frontend
      dockerfile: Dockerfile.dev
    container_name: jj_frontend
    restart: unless-stopped
    ports:
      - "80:4200"
    working_dir: /workspaces/J-J-PROYECTO-INTERMODULAR/frontend
    volumes:
      - .:/workspaces/J-J-PROYECTO-INTERMODULAR:cached
      - frontend_node_modules:/workspaces/J-J-PROYECTO-INTERMODULAR/frontend/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: bash -c "npm install && npm install -g @angular/cli && ng serve --host 0.0.0.0 --port 4200 --poll 2000"
    networks:
      - jj_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: jj_phpmyadmin
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
      PMA_USER: user
      PMA_PASSWORD: password
    networks:
      - jj_network

volumes:
  jj_db_data:
  frontend_node_modules:
  backend_vendor:


networks:
  jj_network:
    driver: bridge
