@if (sidebarState.isOpen()) {
  <div class="sidebar-backdrop" (click)="sidebarState.close()"></div>
}
<aside class="sidebar" [class.open]="sidebarState.isOpen()">
  <div class="user-info">
    <span class="user-avatar">{{ nombreUsuario.charAt(0).toUpperCase() }}</span>
    <div class="user-meta">
      <span class="user-name">{{ nombreUsuario }}</span>
      <span class="user-role">{{ rolUsuario }}</span>
    </div>
  </div>

  <nav>
    <ul class="menu">
      <li>
        <button (click)="navigateTo('/dashboard')">
          <span class="icon">🏠</span> Dashboard
        </button>
      </li>
      <li>
        <button (click)="navigateTo('/pos')">
          <span class="icon">🛒</span> Ventas (TPV)
        </button>
      </li>
      <li>
        <button (click)="navigateTo('/billing')">
          <span class="icon">💳</span> Facturación
        </button>
      </li>
      <li>
        <button (click)="navigateTo('/time-control')">
          <span class="icon">⏰</span> Control horario
        </button>
      </li>
      <li>
        <button (click)="navigateTo('/stock')">
          <span class="icon">📦</span> Stock
        </button>
      </li>
      @if (auth.isAdminOrGerente()) {
        <li>
          <button (click)="navigateTo('/usuarios')">
            <span class="icon">👤</span> Usuarios
          </button>
        </li>
      }
      <li>
        <button (click)="navigateTo('/perfil')">
          <span class="icon">🪪</span> Mi perfil
        </button>
      </li>
      <li>
        <button (click)="navigateTo('/help')"><span class="icon">❓</span> Ayuda</button>
      </li>
    </ul>
  </nav>
</aside>
